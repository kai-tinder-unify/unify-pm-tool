<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tell the browser this is a light UI so native form controls / scrollbars
         render in light mode by default, and tint the mobile address bar paper. -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F5F6F8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Unify Command Center type stack: DM Sans (UI/body, 300–600), Fraunces
         (large display figures, always weight 300, optical-size axis), DM Mono
         (labels/metadata, 400–500). Must stay in sync with fontFamily in
         tailwind.config.js and the body font in index.css. -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap"
      rel="stylesheet"
    />
    <title>Unify Ascend Task Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
